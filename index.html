<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDHALGO - Platform Gamifikasi Logika</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar untuk tampilan elegan */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tampilan grid simulasi */
        .sim-cell {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(30, 41, 59, 0.5);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Container Utama -->
    <div id="app" class="w-full h-full flex flex-col relative">

        <!-- VIEW: AUTHENTICATION (LOGIN & REGISTER) -->
        <div id="view-auth" class="flex-1 flex items-center justify-center p-4 bg-slate-50 fade-in relative overflow-hidden">
            
            <!-- Floating Form Card (Bersih & Elegan) -->
            <div class="z-10 w-full max-w-md bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 p-8 md:p-10 relative transform transition-all hover:-translate-y-1 duration-500">
                
                <!-- Header Logo (Besar sesuai permintaan) -->
                <div class="text-center mb-8">
                    <img src="https://i.imghippo.com/files/TEo9267qxU.png" alt="ANDHALGO Logo" class="w-40 h-40 mx-auto mb-4 object-contain drop-shadow-md hover:scale-105 transition-transform duration-300">
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">ANDHALGO</h1>
                </div>

                <!-- Notifikasi Error/Success -->
                <div id="auth-message" class="hidden mb-4 p-3 rounded-lg text-sm text-center font-bold"></div>

                <!-- FORM LOGIN -->
                <div id="form-login" class="fade-in">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Masuk ke Akun</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Username</label>
                            <input type="text" id="login-username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="Masukkan username">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Password</label>
                            <input type="password" id="login-password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="Masukkan password">
                        </div>
                        <button onclick="app.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all mt-2">
                            Masuk <i class="fas fa-sign-in-alt ml-1"></i>
                        </button>
                    </div>
                    <div class="mt-6 text-center text-sm text-slate-500">
                        Belum punya akun? <button onclick="app.toggleAuth('register')" class="text-blue-600 font-bold hover:underline">Daftar Mandiri</button>
                    </div>
                </div>

                <!-- FORM REGISTER (Sembunyi by default) -->
                <div id="form-register" class="hidden fade-in">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Daftar Akun Baru</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Nama Lengkap</label>
                            <input type="text" id="reg-nama" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="Nama lengkap Anda">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Username</label>
                            <input type="text" id="reg-username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="Buat username (tanpa spasi)">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-600 mb-1">Password</label>
                            <input type="password" id="reg-password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" placeholder="Buat password">
                        </div>
                        <button onclick="app.register()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/30 transition-all mt-2">
                            Daftar Sekarang <i class="fas fa-user-plus ml-1"></i>
                        </button>
                    </div>
                    <div class="mt-6 text-center text-sm text-slate-500">
                        Sudah punya akun? <button onclick="app.toggleAuth('login')" class="text-blue-600 font-bold hover:underline">Masuk di sini</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- VIEW: SISWA (ARENA SIMULASI) -->
        <div id="view-siswa" class="hidden flex-1 flex-col bg-slate-900 overflow-hidden fade-in">
            <!-- Header Siswa -->
            <div class="h-16 bg-slate-950 border-b border-slate-800 flex items-center justify-between px-4 md:px-6 shrink-0">
                <div class="flex items-center gap-3">
                    <img src="https://i.imghippo.com/files/TEo9267qxU.png" class="w-8 h-8 md:w-10 md:h-10 object-contain">
                    <span class="font-bold text-white text-lg tracking-wide hidden sm:block">ANDHALGO</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="bg-amber-500/20 text-amber-400 px-4 py-1.5 rounded-full text-sm font-bold border border-amber-500/30 shadow-inner flex items-center gap-2">
                        <i class="fas fa-coins"></i> <span id="student-xp">0 XP</span>
                    </div>
                    <button onclick="app.logout()" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 p-2 rounded-xl border border-red-500/20 transition-all">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>

            <!-- Konten Arena -->
            <div class="flex-1 flex flex-col p-4 md:p-6 gap-5 overflow-y-auto">
                
                <!-- ATAS: Urutan (Kiri) & Simulasi (Kanan) -->
                <div class="flex flex-col lg:flex-row gap-5 flex-1 min-h-[400px]">
                    
                    <!-- Kiri: Urutan Program -->
                    <div class="w-full lg:w-1/2 bg-[#0f172a] rounded-2xl shadow-2xl border border-slate-700 flex flex-col p-4 relative">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-slate-300 font-bold font-mono text-sm flex items-center gap-2"><i class="fas fa-list-ol text-blue-400"></i> Urutan Program:</h3>
                            <button onclick="app.clearArena()" class="text-slate-400 hover:text-red-400 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-xs font-mono transition-colors shadow-sm">
                                <i class="fas fa-trash-alt mr-1"></i> Bersihkan
                            </button>
                        </div>
                        
                        <div id="arena-sequence" class="flex-1 bg-[#1e293b] rounded-xl border-2 border-dashed border-slate-600 p-3 flex flex-col gap-2 overflow-y-auto shadow-inner">
                            <div id="arena-empty-state" class="m-auto text-slate-500 text-center flex flex-col items-center">
                                <i class="fas fa-code text-4xl mb-3 opacity-30"></i>
                                <p class="text-xs font-mono text-center">Belum ada instruksi.<br>Pilih dari Kotak Alat di bawah.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Kanan: Layar Simulasi (Dark Mode Elegan) -->
                    <div class="w-full lg:w-1/2 bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 p-4 flex flex-col relative">
                        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                            <h3 class="text-sm font-bold text-slate-200 uppercase tracking-wider flex items-center gap-2">
                                <i class="fas fa-desktop text-emerald-400"></i> Layar Simulasi
                            </h3>
                            <span class="text-xs text-slate-400 font-mono">Status: <span id="status-badge" class="text-emerald-400">Siap</span></span>
                        </div>
                        
                        <!-- Area Grid -->
                        <div class="flex-1 flex items-center justify-center bg-[#0f172a] rounded-xl border border-slate-800 p-4 shadow-inner relative overflow-hidden">
                            <div class="relative bg-[#1e293b] shadow-[0_0_20px_rgba(0,0,0,0.5)] rounded-lg p-1 w-full max-w-[300px] aspect-square mx-auto border border-slate-700">
                                <div id="sim-grid" class="w-full h-full grid grid-cols-5 grid-rows-5 rounded bg-slate-900 border border-slate-800 overflow-hidden">
                                    <!-- Grid sel di-generate via JS -->
                                </div>
                                <!-- Robot Element -->
                                <div id="robot" class="absolute w-1/5 h-1/5 flex items-center justify-center transition-all duration-300 z-10" style="left: 0%; top: 0%;">
                                    <i class="fas fa-robot text-blue-400 text-3xl drop-shadow-[0_0_8px_rgba(96,165,250,0.8)]"></i>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Console Log -->
                        <div class="mt-4 p-3 bg-[#020617] rounded-xl text-xs font-mono text-emerald-400 border border-slate-800 shadow-inner flex items-center gap-3 shrink-0">
                            <i class="fas fa-terminal text-slate-500"></i>
                            <span id="sim-status" class="truncate">Menunggu instruksi...</span>
                        </div>
                    </div>
                </div>

                <!-- BAWAH: Kotak Alat & Kontrol -->
                <div class="bg-[#1e293b] rounded-2xl shadow-2xl border border-slate-700 p-5 flex flex-col md:flex-row items-center gap-5 shrink-0">
                    <div class="flex-1 flex flex-wrap gap-2 justify-center md:justify-start">
                        <button onclick="app.addInstruction('MAJU')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition-all active:scale-95"><i class="fas fa-arrow-up mr-1"></i> MAJU</button>
                        <button onclick="app.addInstruction('MUNDUR')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition-all active:scale-95"><i class="fas fa-arrow-down mr-1"></i> MUNDUR</button>
                        <button onclick="app.addInstruction('KANAN')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition-all active:scale-95"><i class="fas fa-redo mr-1"></i> KANAN</button>
                        <button onclick="app.addInstruction('KIRI')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md transition-all active:scale-95"><i class="fas fa-undo mr-1"></i> KIRI</button>
                    </div>
                    
                    <button onclick="app.runSimulation()" class="w-full md:w-auto bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-8 py-3 rounded-xl font-extrabold shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all flex items-center justify-center gap-2 active:scale-95">
                        <i class="fas fa-play"></i> JALANKAN PROGRAM
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Database (Biarkan IS_PREVIEW = true selama pengujian UI)
        const IS_PREVIEW = false;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwbpM_Oq6Spq-XQ3DBy51Vu6FWsEQ57hooPiL4RkH5vtrHiuBfaDxuQCyyqdpkndBEltA/exec"; 
        
        // Mock Database Lokal
        let mockUsers = [{ username: 'andhi', password: '123456', nama: 'Andhi Ganteng', skor: 0 }];

        // State Aplikasi
        const state = {
            currentUser: null,
            instructions: [],
            robotPos: { x: 0, y: 0 }
        };

        const app = {
            init() {
                this.renderGrid();
                this.updateRobotVisual();
            },

            // --- AUTENTIKASI ---
            toggleAuth(mode) {
                document.getElementById('form-login').classList.toggle('hidden', mode !== 'login');
                document.getElementById('form-register').classList.toggle('hidden', mode !== 'register');
                this.showMessage('', '');
            },
            
            showMessage(msg, type = 'error') {
                const el = document.getElementById('auth-message');
                if(!msg) { el.classList.add('hidden'); return; }
                el.textContent = msg;
                el.className = `mb-4 p-3 rounded-lg text-sm text-center font-bold block ${type === 'error' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-700'}`;
            },

            async login() {
                const u = document.getElementById('login-username').value;
                const p = document.getElementById('login-password').value;
                if(!u || !p) return this.showMessage("Isi username dan password!");
                
                this.showMessage("Sedang memproses...", "success");
                
                // Normalisasi di frontend sebagai lapis pertama
                const cleanU = u.replace(/^@/, '').toLowerCase();

                if(IS_PREVIEW) {
                    setTimeout(() => {
                        const user = mockUsers.find(x => x.username.toLowerCase() === cleanU && x.password === p);
                        if(user) {
                            state.currentUser = user;
                            this.showViewSiswa();
                        } else {
                            this.showMessage("Username atau password salah!");
                        }
                    }, 500);
                } else {
                    // API Call ke GAS (nanti)
                    // fetch...
                }
            },

            async register() {
                const n = document.getElementById('reg-nama').value;
                const u = document.getElementById('reg-username').value;
                const p = document.getElementById('reg-password').value;
                
                if(!n || !u || !p) return this.showMessage("Lengkapi semua data!");

                // Normalisasi
                const cleanU = u.replace(/^@/, '').toLowerCase();

                if(IS_PREVIEW) {
                    if(mockUsers.find(x => x.username.toLowerCase() === cleanU)) {
                        return this.showMessage("Username sudah dipakai!");
                    }
                    mockUsers.push({ username: cleanU, password: p, nama: n, skor: 0 });
                    this.showMessage("Berhasil mendaftar! Silakan login.", "success");
                    setTimeout(() => this.toggleAuth('login'), 1000);
                }
            },

            logout() {
                state.currentUser = null;
                document.getElementById('view-siswa').classList.add('hidden');
                document.getElementById('view-auth').classList.remove('hidden');
                this.clearArena();
            },

            showViewSiswa() {
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-siswa').classList.remove('hidden');
                document.getElementById('view-siswa').classList.add('flex');
                document.getElementById('student-xp').textContent = `${state.currentUser.skor} XP`;
            },

            // --- SIMULATOR & ARENA ---
            renderGrid() {
                const grid = document.getElementById('sim-grid');
                grid.innerHTML = '';
                for(let i=0; i<25; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sim-cell';
                    grid.appendChild(cell);
                }
            },

            addInstruction(cmd) {
                state.instructions.push(cmd);
                this.renderSequence();
            },

            clearArena() {
                state.instructions = [];
                state.robotPos = { x: 0, y: 0 };
                this.updateRobotVisual();
                this.renderSequence();
                document.getElementById('sim-status').textContent = 'Sistem siap. Menunggu instruksi...';
            },

            renderSequence() {
                const container = document.getElementById('arena-sequence');
                const empty = document.getElementById('arena-empty-state');
                
                if(state.instructions.length === 0) {
                    empty.style.display = 'flex';
                    Array.from(container.children).forEach(c => { if(c.id !== 'arena-empty-state') c.remove() });
                    return;
                }
                
                empty.style.display = 'none';
                Array.from(container.children).forEach(c => { if(c.id !== 'arena-empty-state') c.remove() });

                state.instructions.forEach((cmd, idx) => {
                    const el = document.createElement('div');
                    let color = cmd === 'MAJU' || cmd === 'MUNDUR' ? 'bg-blue-500/20 text-blue-300 border-blue-500/30' : 'bg-indigo-500/20 text-indigo-300 border-indigo-500/30';
                    el.className = `${color} border p-2 rounded flex items-center justify-between text-sm font-bold font-mono fade-in`;
                    el.innerHTML = `<span>${idx + 1}. ${cmd}</span>`;
                    container.appendChild(el);
                });
                container.scrollTop = container.scrollHeight;
            },

            updateRobotVisual() {
                const robot = document.getElementById('robot');
                robot.style.left = `${state.robotPos.x * 20}%`;
                robot.style.top = `${state.robotPos.y * 20}%`;
            },

            async runSimulation() {
                if(state.instructions.length === 0) return;
                
                document.getElementById('sim-status').textContent = 'Menjalankan program...';
                state.robotPos = { x: 0, y: 0 };
                this.updateRobotVisual();

                for(let cmd of state.instructions) {
                    await new Promise(r => setTimeout(r, 600)); // Delay animasi
                    
                    if(cmd === 'MAJU') state.robotPos.y = Math.max(0, state.robotPos.y - 1);
                    if(cmd === 'MUNDUR') state.robotPos.y = Math.min(4, state.robotPos.y + 1);
                    if(cmd === 'KANAN') state.robotPos.x = Math.min(4, state.robotPos.x + 1);
                    if(cmd === 'KIRI') state.robotPos.x = Math.max(0, state.robotPos.x - 1);
                    
                    this.updateRobotVisual();
                    document.getElementById('sim-status').textContent = `Eksekusi: ${cmd} (X:${state.robotPos.x}, Y:${state.robotPos.y})`;
                }
                
                document.getElementById('sim-status').textContent = 'Program selesai dieksekusi.';
            }
        };

        // Mulai aplikasi
        window.onload = () => app.init();
    </script>
</body>
</html>
